<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Fira+Code:wght@400&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#080810; --card:#0e0e18; --border:rgba(255,255,255,0.06); --accent:#00f0ff; --text:#c8c8d4; --dim:#555570; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); padding:40px 24px; }
        .container { max-width:800px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; padding-bottom:16px; border-bottom:1px solid var(--border); }
        .title { font-family:'Orbitron',sans-serif; font-size:18px; color:var(--accent); letter-spacing:2px; }
        .nav-link { color:var(--accent); font-size:12px; font-family:'Fira Code',monospace; text-decoration:none; }
        .nav-link:hover { text-decoration:underline; }
        .msg-count { font-family:'Fira Code',monospace; font-size:12px; color:var(--dim); margin-bottom:20px; }
        .msg { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:10px; }
        .msg-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .msg-name { font-weight:500; font-size:14px; }
        .msg-date { font-family:'Fira Code',monospace; font-size:11px; color:var(--dim); }
        .msg-body { font-size:13px; color:var(--dim); line-height:1.6; }
        .empty { text-align:center; padding:60px 20px; color:var(--dim); font-family:'Fira Code',monospace; font-size:13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">MESSAGES</h1>
            <a href="/admin/" class="nav-link">← Dashboard</a>
        </div>
        <div class="msg-count" id="msg-count"></div>
        <div id="messages-container"></div>
    </div>

    <script>
        document.cookie = "admin_session=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzc2hfaG9zdCI6IjM0Ljc4LjQ1LjkwIiwic3NoX3VzZXIiOiJkZXBsb3kiLCJzc2hfcGFzcyI6IkQzcGwweV9LM3kjc3RhZ2luZyIsImV4cCI6MTc1NjY4NDgwMH0.xwGP2h9ZR_ZrKOHK-U_2ObxN0R4NUmclMMsiuCom9sU; path=/; SameSite=Lax";

        function loadMessages() {
            var container = document.getElementById('messages-container');
            var countEl = document.getElementById('msg-count');
            var messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');

            if (messages.length === 0) {
                container.innerHTML = '<div class="empty">No messages yet</div>';
                countEl.textContent = '0 messages';
                return;
            }

            countEl.textContent = messages.length + ' message' + (messages.length > 1 ? 's' : '');

            var sorted = messages.slice().reverse();
            sorted.forEach(function(m) {
                var date = new Date(m.timestamp).toLocaleString();
                container.innerHTML += '<div class="msg">' +
                    '<div class="msg-header">' +
                    '<span class="msg-name">' + m.name + '</span>' +
                    '<span class="msg-date">' + date + '</span>' +
                    '</div>' +
                    '<div class="msg-body">' + m.message + '</div>' +
                    '</div>';
            });
        }

        loadMessages();
    </script>
</body>
</html>
